<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destek Merkezi | Cyber Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-purple: #bc13fe;
            --neon-green: #25d366; /* WhatsApp Yeşili */
        }

        body {
            background: #05010a;
            color: #f1f1f1;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background Particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0b2e 0%, #05010a 100%);
        }

        .bg-particles::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(37, 211, 102, 0.05) 0%, transparent 50%);
        }

        .cyber-card {
            background: rgba(20, 10, 35, 0.85);
            border: 1px solid rgba(188, 19, 254, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            transition: 0.4s;
            position: relative;
            z-index: 10;
        }

        .cyber-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.15);
        }

        .ws-btn {
            background: linear-gradient(90deg, #128C7E, #25D366);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ws-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.4);
        }

        .neon-text {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        .back-btn {
            position: absolute;
            top: -20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
            z-index: 20;
        }

        .back-btn:hover {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }
    </style>
</head>
<body class="p-6">

    <div class="bg-particles"></div>

    <div class="max-w-md w-full cyber-card p-10 text-center relative">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left mr-2"></i> Geri Dön</a>
        
        <!-- Başlık -->
        <div class="mb-8 mt-4">
            <h2 class="neon-text text-2xl font-black italic mb-2">DESTEK MERKEZİ</h2>
            <div class="h-1 w-20 bg-purple-600 mx-auto rounded-full"></div>
        </div>

        <p class="text-gray-400 text-sm mb-10 leading-relaxed">
            Bakiye yüklemeleri, servis sorunları veya reklam işbirlikleri için doğrudan <b>Başkan</b> ile iletişime geçin.
        </p>

        <!-- WhatsApp Butonları -->
        <div class="space-y-4">
            
            <!-- Bakiye Yükleme Butonu -->
            <a href="https://wa.me/905514799252?text=Selam%20Başkan,%20panelde%20bakiye%20yüklemek%20istiyorum." 
               target="_blank" class="ws-btn w-full py-5 text-lg">
                <i class="fab fa-whatsapp text-2xl"></i>
                BAKİYE YÜKLE
            </a>

            <!-- Teknik Destek Butonu -->
            <a href="https://wa.me/905514799252?text=Selam%20Başkan,%20bir%20sorun%20yaşıyorum,%20yardımcı%20olur%20musun?" 
               target="_blank" class="border border-green-500/30 text-green-400 w-full py-4 rounded-2xl flex items-center justify-center gap-2 font-bold hover:bg-green-500/10 transition">
                <i class="fas fa-headset"></i>
                TEKNİK DESTEK
            </a>

        </div>

        <!-- Alt Bilgi -->
        <div class="mt-10 pt-6 border-t border-purple-900/30">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">
                Çalışma Saatleri: 10:00 - 02:00
            </p>
        </div>
    </div>

</body>
</html>
